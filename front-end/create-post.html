<!DOCTYPE html>
<html>
<head>
    <title>Create Post - ArticleHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="navbar">
        <h1>ArticleHub</h1>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="form-container">

        <h2>Create Blog Post</h2>

        <input type="text" id="title" placeholder="Enter Post Title">

        <select id="category">
            <option value="">Select Category</option>
            <option value="Technology">Technology</option>
            <option value="Programming">Programming</option>
            <option value="Artificial Intelligence">Artificial Intelligence</option>
            <option value="Web Development">Web Development</option>
            <option value="Education">Education</option>
            <option value="Business">Business</option>
            <option value="Travel">Travel</option>
            <option value="Food">Food</option>
            <option value="Sports">Sports</option>
            <option value="Lifestyle">Lifestyle</option>
        </select>

        <input type="text" id="description" placeholder="Short Description">

        <input type="text" id="image" placeholder="Cover Image URL">

        <textarea id="content" placeholder="Write your full blog content here..."></textarea>

        <button type="button" id="publishBtn" onclick="createPost()">Publish Post</button>

        <button type="button" class="secondary-btn" onclick="window.location.href='index.html'">
    Check The Post
</button>

    </div>

    <script src="js/create-post.js"></script>

</body>
</html>
